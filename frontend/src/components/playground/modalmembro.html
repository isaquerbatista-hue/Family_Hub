<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal de Membros - Family Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #888888;
            margin-bottom: 20px;
        }

        .btn-novo {
            background: #56d364;
            color: #121212;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-novo:hover {
            background: #2bda56;
            transform: translateY(-2px);
        }

        /* LISTA DE MEMBROS */
        .membros-lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .membro-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: 0.2s;
        }

        .membro-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .membro-avatar {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .membro-nome {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .membro-papel {
            font-size: 0.85rem;
            color: #888888;
            margin-bottom: 12px;
        }

        .membro-acoes {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-icone {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-icone:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-icone.deletar:hover {
            background: rgba(255, 0, 0, 0.1);
            color: red;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.ativo {
            display: flex;
        }

        .modal-conteudo {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-conteudo h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-family: sans-serif;
        }

        .form-membro {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grupo-form {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            color: #bbb;
            text-align: left;
        }

        input,
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        input:focus,
        select:focus {
            border-color: #56d364;
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .botoes-modal {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-cancelar {
            background: transparent;
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cancelar:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-salvar {
            background: #56d364;
            color: black;
        }

        .btn-salvar:hover {
            background: #46b352;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .modal-conteudo {
                width: 95%;
            }

            .membros-lista {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>Gerenciar Membros</h1>
            <p>Adicione, edite ou remova membros da sua família.</p>
            <button class="btn-novo" id="btnNovoMembro">+ Novo Membro</button>
        </div>

        <div class="membros-lista" id="membrosLista"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-conteudo">
            <h3 id="modalTitulo">Novo Membro</h3>

            <form class="form-membro" id="formMembro">
                <div class="grupo-form">
                    <label for="inputNome">Nome:</label>
                    <input type="text" id="inputNome" required placeholder="Ex: Lucas" />
                </div>

                <div class="grupo-form">
                    <label for="inputPapel">Papel na Família:</label>
                    <select id="inputPapel">
                        <option value="Filho(a)">Filho(a)</option>
                        <option value="Pai/Mãe">Pai/Mãe</option>
                        <option value="Avô/Avó">Avô/Avó</option>
                        <option value="Tio/Tia">Tio/Tia</option>
                        <option value="Convidado">Convidado</option>
                    </select>
                </div>

                <div class="grupo-form">
                    <label for="inputAvatar">Emoji (Avatar):</label>
                    <input type="text" id="inputAvatar" required placeholder="Ex: 🐶" maxlength="2" />
                </div>

                <div class="botoes-modal">
                    <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Mock de membros
        let mockMembros = [
            {
                id: 1,
                nome: 'João Silva',
                papel: 'Pai/Mãe',
                avatar: '👨'
            },
            {
                id: 2,
                nome: 'Maria Silva',
                papel: 'Pai/Mãe',
                avatar: '👩'
            },
            {
                id: 3,
                nome: 'Lucas Silva',
                papel: 'Filho(a)',
                avatar: '👦'
            },
            {
                id: 4,
                nome: 'Ana Silva',
                papel: 'Filho(a)',
                avatar: '👧'
            }
        ];

        let nextId = 5;
        let membroEditando = null;

        // Elementos DOM
        const modalOverlay = document.getElementById('modalOverlay');
        const formMembro = document.getElementById('formMembro');
        const modalTitulo = document.getElementById('modalTitulo');
        const inputNome = document.getElementById('inputNome');
        const inputPapel = document.getElementById('inputPapel');
        const inputAvatar = document.getElementById('inputAvatar');
        const btnNovoMembro = document.getElementById('btnNovoMembro');
        const btnCancelar = document.getElementById('btnCancelar');
        const membrosLista = document.getElementById('membrosLista');

        // Abrir modal novo membro
        btnNovoMembro.addEventListener('click', () => {
            membroEditando = null;
            modalTitulo.textContent = 'Novo Membro';
            formMembro.reset();
            inputPapel.value = 'Filho(a)';
            inputAvatar.value = '👤';
            abrirModal();
        });

        // Fechar modal
        btnCancelar.addEventListener('click', fecharModal);

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                fecharModal();
            }
        });

        function abrirModal() {
            modalOverlay.classList.add('ativo');
        }

        function fecharModal() {
            modalOverlay.classList.remove('ativo');
        }

        // Salvar membro
        formMembro.addEventListener('submit', (e) => {
            e.preventDefault();

            const nome = inputNome.value.trim();
            const papel = inputPapel.value;
            const avatar = inputAvatar.value.trim();

            if (!nome || !avatar) {
                alert('Preencha todos os campos!');
                return;
            }

            if (membroEditando) {
                // Atualizar
                membroEditando.nome = nome;
                membroEditando.papel = papel;
                membroEditando.avatar = avatar;
            } else {
                // Criar novo
                mockMembros.push({
                    id: nextId++,
                    nome: nome,
                    papel: papel,
                    avatar: avatar
                });
            }

            renderMembros();
            fecharModal();
        });

        function renderMembros() {
            membrosLista.innerHTML = '';

            mockMembros.forEach(membro => {
                const item = document.createElement('div');
                item.className = 'membro-item';

                item.innerHTML = `
                    <div class="membro-avatar">${membro.avatar}</div>
                    <div class="membro-nome">${membro.nome}</div>
                    <div class="membro-papel">${membro.papel}</div>
                    <div class="membro-acoes">
                        <button class="btn-icone btn-editar" data-id="${membro.id}">✏️ Editar</button>
                        <button class="btn-icone deletar btn-remover" data-id="${membro.id}">🗑️ Remover</button>
                    </div>
                `;

                membrosLista.appendChild(item);
            });

            attachItemListeners();
        }

        function attachItemListeners() {
            document.querySelectorAll('.btn-editar').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.target.getAttribute('data-id'));
                    membroEditando = mockMembros.find(m => m.id === id);

                    modalTitulo.textContent = 'Editar Membro';
                    inputNome.value = membroEditando.nome;
                    inputPapel.value = membroEditando.papel;
                    inputAvatar.value = membroEditando.avatar;

                    abrirModal();
                });
            });

            document.querySelectorAll('.btn-remover').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.target.getAttribute('data-id'));
                    const membro = mockMembros.find(m => m.id === id);

                    if (confirm(`Deseja remover ${membro.nome}?`)) {
                        mockMembros = mockMembros.filter(m => m.id !== id);
                        renderMembros();
                    }
                });
            });
        }

        // Renderizar inicial
        renderMembros();
    </script>
</body>
</html>
