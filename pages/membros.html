<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub - Membros</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div id="layout-principal" class="layout-principal">

        <aside id="menu-lateral" class="menu-lateral">
            <div class="sidebar-header">
                <h1>Family Hub</h1>
                <button id="toggle-sidebar" class="toggle-btn" title="Recolher Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="../index.html">
                            <img class="icon" src="../assets/icons/house-solid-full.svg" alt="#">
                            <span class="menu-text">Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="tarefas.html">
                            <img class="icon" src="../assets/icons/list-solid-full.svg" alt="#">
                            <span class="menu-text">Gerenciar Tarefas</span>
                        </a>
                    </li>
                    <li>
                        <a href="membros.html" class="active">
                            <img class="icon" src="../assets/icons/members.svg" alt="#">
                            <span class="menu-text">Membros da Família</span>
                        </a>
                    </li>
                    <li>
                        <a href="relatorios.html">
                            <img class="icon" src="../assets/icons/chart-bar-solid-full.svg" alt="#">
                            <span class="menu-text">Relatórios e Análises</span>
                        </a>
                    </li>
                    <li>
                        <a href="configurações.html">
                            <img class="icon" src="../assets/icons/gear-solid-full.svg" alt="#">
                            <span class="menu-text">Configurações</span>
                        </a>
                    </li>
                </ul>
                <hr>
                <ul>
                    <li>
                        <a href="login.html">
                            <img class="icon" src="../assets/icons/solar_exit-bold.svg" alt="#">
                            <span class="menu-text">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <h2>Membros da Família</h2>

            <section>
                <h3>Lista de Membros</h3>
                <ul>
                    <li style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 12px 0;">
                        <div>
                            <strong>Pai</strong> <small style="color: var(--accent-color); margin-left: 8px;">(Admin)</small>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">pai@email.com</div>
                        </div>
                        <button style="background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; cursor: pointer;">Editar</button>
                    </li>
                    <li style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: none;">
                        <div>
                            <strong>Filho 1</strong> <small style="color: var(--text-secondary); margin-left: 8px;">(Membro)</small>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">filho@email.com</div>
                        </div>
                        <div>
                            <button style="background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 8px;">Editar</button> 
                            <button style="background: var(--danger-color); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Remover</button>
                        </div>
                    </li>
                </ul>
            </section>

            <section>
                <h3>Convidar Novo Membro</h3>
                <form>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                        <div>
                            <label style="display:block; margin-bottom: 4px; font-size: 14px;">Nome:</label>
                            <input type="text" placeholder="Nome" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom: 4px; font-size: 14px;">E-mail:</label>
                            <input type="email" placeholder="E-mail" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom: 4px; font-size: 14px;">Cargo:</label>
                        <select style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                            <option>Membro Standard</option>
                            <option>Administrador</option>
                        </select>
                    </div>

                    <button type="submit" style="background: var(--accent-color); color: #fff; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 500; cursor: pointer;">Enviar Convite</button>
                </form>
            </section>

        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
