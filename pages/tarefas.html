<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub - Gerenciar Tarefas</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales-all.global.min.js'></script>
</head>

<body>
    <div id="layout-principal" class="layout-principal">

        <aside id="menu-lateral" class="menu-lateral">
            <div class="sidebar-header">
                <h1>Family Hub</h1>
                <button id="toggle-sidebar" class="toggle-btn" title="Recolher Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="../index.html">
                            <img class="icon" src="../assets/icons/house-solid-full.svg" alt="#">
                            <span class="menu-text">Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="tarefas.html" class="active">
                            <img class="icon" src="../assets/icons/list-solid-full.svg" alt="#">
                            <span class="menu-text">Gerenciar Tarefas</span>
                        </a>
                    </li>
                    <li>
                        <a href="membros.html">
                            <img class="icon" src="../assets/icons/members.svg" alt="#">
                            <span class="menu-text">Membros da Família</span>
                        </a>
                    </li>
                    <li>
                        <a href="relatorios.html">
                            <img class="icon" src="../assets/icons/chart-bar-solid-full.svg" alt="#">
                            <span class="menu-text">Relatórios e Análises</span>
                        </a>
                    </li>
                    <li>
                        <a href="configurações.html">
                            <img class="icon" src="../assets/icons/gear-solid-full.svg" alt="#">
                            <span class="menu-text">Configurações</span>
                        </a>
                    </li>
                </ul>
                <hr>
                <ul>
                    <li>
                        <a href="login.html">
                            <img class="icon" src="../assets/icons/solar_exit-bold.svg" alt="#">
                            <span class="menu-text">Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <h2>Gerenciamento de Tarefas</h2>

            <div id='calendario-familia'></div>

            <section>
                <h3>Criar Nova Tarefa</h3>
                <form>
                    <div style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-size: 14px;">Título:</label>
                        <input type="text" placeholder="Ex: Lavar o carro" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary);">
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-size: 14px;">Atribuir a:</label>
                        <select style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary);">
                            <option>Pai</option>
                            <option>Mãe</option>
                            <option>Filho 1</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-size: 14px;">Categoria/Tag:</label>
                        <input type="text" list="tags" placeholder="Cozinha, Pets, Limpeza..." style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary);">
                        <datalist id="tags">
                            <option value="Cozinha"></option>
                            <option value="Jardim"></option>
                            <option value="Compras"></option>
                        </datalist>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label style="display:block; margin-bottom: 4px; font-size: 14px;">Prazo:</label>
                        <input type="date" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary);">
                    </div>

                    <button type="submit" style="background: var(--accent-color); color: #fff; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer;">Adicionar Tarefa</button>
                </form>
            </section>

            <section>
                <h3>Lista de Tarefas Ativas</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Tarefa</th>
                            <th>Responsável</th>
                            <th>Tag</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox"></td>
                            <td>Comprar pão</td>
                            <td>Pai</td>
                            <td>Compras</td>
                            <td>
                                <button style="background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px;">Editar</button> 
                                <button style="background: var(--danger-color); color: #fff; border: none; padding: 4px 8px; border-radius: 4px;">Excluir</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" checked></td>
                            <td><del>Levar o lixo</del></td>
                            <td>Filho 1</td>
                            <td>Limpeza</td>
                            <td>
                                <button style="background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px;">Reabrir</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
